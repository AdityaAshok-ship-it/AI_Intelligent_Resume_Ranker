ai_usage_summary: |
  Used Claude (Sonnet 4.6) as a coding assistant — writing and debugging code for
  specified modules. Architecture, rubric design, weight choices, disqualifier
  rules, and methodology decisions were made by the participant. Claude served as
  a coding tool; design and review remained with the participant. Candidate data
  was not fed to any LLM.

methodology_summary: |
  Career-first rubric (70% career evidence + 20% embedding + 10% skills, no education weight)
  with a continuous availability multiplier and five-rule honeypot exclusion gate.
  The embedding (bge-base-en-v1.5, 768-d) is precomputed offline; the in-budget
  ranking step does no model loading. Key design choices: (1) caps before multiplier
  so disqualified candidates cannot be rescued by high availability; (2) H1–H4
  timeline-impossibility rules instead of the naive skill-duration rule (which fires
  on 13–19% of the pool and deletes the archetype CAND_0000031); (3) gentle continuous
  availability multiplier with a ghost-floor (~0.15) that fires only on the conjunction
  of stale + non-responsive + not-open; (4) fact-grounded reasoning templates with no
  LLM for deterministic Stage-3 reproducibility. All decisions logged in decision.md.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
